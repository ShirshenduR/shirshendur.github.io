name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # runs on every push to main (including new blog .md files)
  workflow_dispatch:   # also lets you trigger it manually from GitHub UI

permissions:
  contents: write   # needed to push to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js (match what you use locally)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build the Vite project → outputs to dist/
      - name: Build
        run: npm run build

      # 5. Deploy dist/ to the gh-pages branch
      #    peaceiris/actions-gh-pages is the most reliable way to do this
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
